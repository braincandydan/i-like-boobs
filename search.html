<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-PRRSZTDC');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotFlix - Search</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/search.css">
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-PRRSZTDC"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="search-page-container">
        <aside class="search-sidebar">
            <div class="logo-container">
                <a href="index.html">
                    <h1>NotFlix</h1>
                </a>
            </div>
            <div class="search-form-container">
                <form id="search-form">
                    <input type="text" id="search-input" placeholder="Search for a movie...">
                    <select id="media-type">
                        <option value="movie">Movie</option>
                        <option value="tv">TV Show</option>
                        <option value="multi">All</option>
                    </select>
                    <button type="submit">Search</button>
                </form>
            </div>
            <!-- Genre navigation moved here -->
            <nav class="genre-navigation">
                <h3>Genres</h3>
                <ul id="genre-list">
                    <!-- Genre links will be dynamically inserted here -->
                </ul>
            </nav>
        </aside>
        <main class="search-results-container">
            <h2>Search Results</h2>
            <div id="search-results-content"></div>
            <div id="pagination-controls">
                <button id="prev-page" disabled>Previous</button>
                <button id="next-page">Next</button>
            </div>
        </main>
    </div>
    <script src="scripts/search.js"></script>
</body>
</html>
